name: WordPress Daily Cron Trigger

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间 08:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  ping-wp-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger WordPress Cron
        run: |
          curl -I -L --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 -m 60 \
            -H "Cache-Control: no-cache" \
            -A "GitHub-Cron-Trigger" \
            "https://www.chenshaoju.cn/wordpress/wp-cron.php?t=$(date +%s)"
